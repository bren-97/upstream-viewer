upstream test_localhost_2 {
    least_conn;
    server 127.0.0.1:9010 weight=3;
    server 127.0.0.1:9011;
}

server {
    listen 127.0.0.1:18092;
    server_name test-localhost-2.internal;

    location /api/ {
        proxy_pass http://test_localhost_2;
        proxy_set_header Host $host;
    }

    location / {
        return 200 "test-localhost-2\n";
        add_header Content-Type text/plain;
    }
}
