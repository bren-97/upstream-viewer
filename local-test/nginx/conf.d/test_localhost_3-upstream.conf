upstream test_localhost_3 {
    server unix:/tmp/test_localhost_3.sock;
    server 127.0.0.1:9020 max_fails=3 fail_timeout=30s;
}

server {
    listen 127.0.0.1:18093;
    server_name test-localhost-3.internal;

    location / {
        proxy_pass http://test_localhost_3;
        proxy_set_header Host $host;
    }
}
